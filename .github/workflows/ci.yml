name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          # --porcelain корректно работает даже когда go.sum ещё нет (нет зависимостей)
          if [ -n "$(git status --porcelain -- go.mod go.sum)" ]; then
            echo "::error::go.mod/go.sum not tidy — run 'go mod tidy'"
            git status --porcelain -- go.mod go.sum
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8 # v8 требуется для golangci-lint v2
        with:
          version: v2.12.2
          args: --timeout=5m

  compose:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate base stack
        run: docker compose -f deployments/docker-compose/docker-compose.yml config --quiet
      - name: Validate with all profiles
        run: |
          docker compose -f deployments/docker-compose/docker-compose.yml \
            --profile clickhouse --profile observability config --quiet
