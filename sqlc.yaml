version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "migrations"
    queries:
      - "packages/database/queries"
    gen:
      go:
        package: "postgres"
        out: "packages/database/postgres"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_json_tags: true
